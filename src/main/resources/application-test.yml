spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  flyway:
    enabled: false
  rabbitmq:
    host: localhost
    port: 0
    listener:
      simple:
        auto-startup: false
  data:
    redis:
      host: localhost
      port: 0

jwt:
  secret: test-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm

app:
  exchange:
    max-concurrent:
      UPBIT: 3
      BINANCE: 5
      BITHUMB: 5
      BYBIT: 3
      KORBIT: 5
      COINONE: 3
      GATEIO: 2
      OKX: 2
    rate-limit:
      UPBIT:
        type: FIXED_WINDOW
        limit: 8
        window-seconds: 1
      BINANCE:
        type: WEIGHT_BUDGET
        limit: 5000
        window-seconds: 60
      BITHUMB:
        type: FIXED_WINDOW
        limit: 15
        window-seconds: 1
      BYBIT:
        type: FIXED_WINDOW
        limit: 80
        window-seconds: 5
      KORBIT:
        type: FIXED_WINDOW
        limit: 40
        window-seconds: 1
      COINONE:
        type: FIXED_WINDOW
        limit: 8
        window-seconds: 1
      GATEIO:
        type: FIXED_WINDOW
        limit: 8
        window-seconds: 1
      OKX:
        type: FIXED_WINDOW
        limit: 8
        window-seconds: 1

logging:
  level:
    com.danalfintech: DEBUG
