spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:cryptotax}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

jwt:
  secret: local-dev-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256

logging:
  level:
    com.danalfintech: DEBUG
    org.hibernate.SQL: DEBUG